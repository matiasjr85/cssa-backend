spring:
  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:cssa;DB_CLOSE_DELAY=-1}
    username: ${DATABASE_USER:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    defer-datasource-initialization: false
    properties:
      hibernate:
        format_sql: false
        dialect: ${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: false

server:
  port: ${PORT:8080}
